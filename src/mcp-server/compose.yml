services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${MCP_PORT:-8080}:8080"
    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT:-streamable-http}
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MCP_ENABLED_MODULES=${MCP_ENABLED_MODULES:-}
      # S3 storage (same credentials as backend)
      - AWS_S3_ENDPOINT_URL=${AWS_S3_ENDPOINT_URL:-}
      - AWS_S3_ACCESS_KEY_ID=${AWS_S3_ACCESS_KEY_ID:-}
      - AWS_S3_SECRET_ACCESS_KEY=${AWS_S3_SECRET_ACCESS_KEY:-}
      - AWS_S3_REGION_NAME=${AWS_S3_REGION_NAME:-}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-}
      - AWS_S3_VERIFY=${AWS_S3_VERIFY:-true}
      - AWS_S3_SIGNATURE_VERSION=${AWS_S3_SIGNATURE_VERSION:-s3v4}
      # Albert RAG API (same as backend)
      - ALBERT_API_URL=${ALBERT_API_URL:-https://albert.api.etalab.gouv.fr}
      - ALBERT_API_KEY=${ALBERT_API_KEY:-}
      - ALBERT_API_TIMEOUT=${ALBERT_API_TIMEOUT:-30}
      # Web Search
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - RAG_WEB_SEARCH_MAX_RESULTS=${RAG_WEB_SEARCH_MAX_RESULTS:-5}
      # Legifrance
      - LEGIFRANCE_API_BASE_URL=${LEGIFRANCE_API_BASE_URL:-https://api.piste.gouv.fr/dila/legifrance/lf-engine-app}
      - LEGIFRANCE_OAUTH_URL=${LEGIFRANCE_OAUTH_URL:-https://oauth.piste.gouv.fr/api/oauth/token}
      - LEGIFRANCE_CLIENT_ID=${LEGIFRANCE_CLIENT_ID:-}
      - LEGIFRANCE_CLIENT_SECRET=${LEGIFRANCE_CLIENT_SECRET:-}
      - LEGIFRANCE_API_TOKEN=${LEGIFRANCE_API_TOKEN:-}
      - LEGIFRANCE_SSL_VERIFY=${LEGIFRANCE_SSL_VERIFY:-true}
      - LEGIFRANCE_OAUTH_HOST=${LEGIFRANCE_OAUTH_HOST:-}
      - LEGIFRANCE_API_HOST=${LEGIFRANCE_API_HOST:-}
      # Judilibre
      - JUDILIBRE_API_URL=${JUDILIBRE_API_URL:-https://api.piste.gouv.fr/cassation/judilibre/v1.0}
      - JUDILIBRE_KEY_NAME=${JUDILIBRE_KEY_NAME:-KeyId}
      - JUDILIBRE_KEY_VALUE=${JUDILIBRE_KEY_VALUE:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
